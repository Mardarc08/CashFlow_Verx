server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Compressão gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1000;

    # Cache para assets com hash (gerados pelo Angular build)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback — qualquer rota retorna o index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy para API de Lançamentos (evita CORS em dev local via Docker)
    location /api/lancamentos {
        proxy_pass http://lancamentos-api:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Proxy para API de Consolidado
    location /api/consolidado {
        proxy_pass http://consolidado-api:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
